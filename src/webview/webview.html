<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none';
                 style-src {{CSP_SOURCE}};
                 script-src {{CSP_SOURCE}};
                 font-src {{CSP_SOURCE}};
                 connect-src 'none';">
  <title>Sassy</title>
  <base href="{{BASE_URI}}/">
  <link rel="stylesheet" href="webview.css" />
  <link rel="stylesheet" href="{{CODICON_CSS}}" id="vscode-codicon-stylesheet" />
  <script src="{{ELEMENTS_JS}}" type="module" defer></script>
  <script src="webview.js" type="module" defer></script>
</head>

<body>

  <main id="tab-bar">

    <div id="theme-info">
      <vscode-toolbar-container>
        <span class="dirty-theme">
          <vscode-toolbar-button id="btn-build" label="Build theme">
            Build now
          </vscode-toolbar-button>
        </span>
        <vscode-toolbar-button id="btn-autobuild" icon="edit-code" label="Build theme" toggleable>
          Autobuild
        </vscode-toolbar-button>
      </vscode-toolbar-container>

      <div id="theme-header">
        <span id="theme-path">—</span>
        <!-- <span id="dirty-theme"><vscode-icon name="symbol-color">Dirty</vscode-icon></span> -->
      </div>

    </div>

    <vscode-tabs id="main-tabs" panel selected-index="0">

      <!-- Diagnostics -->
      <vscode-tab-header slot="header" id="tab-diagnostics" aria-controls="view-diagnostics">
        Diagnostics
      </vscode-tab-header>

      <vscode-tab-panel>
        <div id="diagnostics">
          <div id="view-diagnostics" class="tab-panel">
            <div id="filter-bar">
              <vscode-toolbar-container>

                <vscode-textfield id="diag-filter" label="Filter" type="text"
                  placeholder="Filter by message or location">
                  <vscode-toolbar-button toggleable id="filter-errors" slot="content-after" icon="error"
                    checked></vscode-toolbar-button>
                  <vscode-toolbar-button toggleable id="filter-warnings" slot="content-after" icon="warning"
                    checked></vscode-toolbar-button>
                  <vscode-toolbar-button toggleable id="filter-info" slot="content-after" icon="info"
                    checked></vscode-toolbar-button>
                </vscode-textfield>

              </vscode-toolbar-container>
            </div>

            <vscode-tree id="diag-list" expandMode="doubleClick">
            </vscode-tree>
          </div>
        </div>
      </vscode-tab-panel>

      <!-- Resolve -->
      <vscode-tab-header id="tab-resolve" aria-controls="view-resolve">
        Resolve
      </vscode-tab-header>

      <vscode-tab-panel>
        <div id="view-resolve" class="tab-panel">

          <div class="resolve-form">
            <div class="resolve-type-wrap">
              <vscode-single-select id="resolve-type" defaultValue="colors">
                <vscode-option value="colors" selected>Color</vscode-option>
                <vscode-option value="tokenColors">Token Color</vscode-option>
                <vscode-option value="semanticTokenColors">Semantic Token Color</vscode-option>
              </vscode-single-select>
            </div>
            <div class="resolve-key-wrap">
              <vscode-single-select id="resolve-key" filter="contains" combobox>
              </vscode-single-select>
            </div>
          </div>

          <div id="resolve-result" hidden>
            <div id="resolve-final" class="resolve-final"></div>
            <div id="resolve-trail"></div>
          </div>

        </div>
      </vscode-tab-panel>

      <!-- Proof -->
      <vscode-tab-header slot="header" id="tab-proof" aria-controls="view-proof">
        Proof
      </vscode-tab-header>

      <vscode-tab-panel>
        <div id="view-proof" class="tab-panel">

          <div id="proof-empty" class="empty-state">
            <p>Load a theme to see its composed theme before evaluation.</p>
          </div>

          <div id="proof-scroll">
            <pre id="proof-content" class="proof-block"></pre>
          </div>

        </div>
      </vscode-tab-panel>

      <!-- Palette -->
      <vscode-tab-header slot="header" id="tab-palette" aria-controls="view-palette">
        Palette
      </vscode-tab-header>

      <vscode-tab-panel>
        <div id="view-palette" class="tab-panel">

          <div id="palette-empty" class="empty-state">
            <p>No palette data available.</p>
          </div>

          <div id="palette-grid" class="palette-grid" hidden></div>

        </div>
      </vscode-tab-panel>

    </vscode-tabs>

  </main>

  <template id="palette-swatch-template">
    <div class="palette-swatch">
      <div class="swatch-color"></div>
      <div class="swatch-info">
        <span class="swatch-name"></span>
        <span class="swatch-value"></span>
      </div>
    </div>
  </template>

  <template id="resolve-step-template">
    <div class="resolve-step">
      <vscode-icon class="step-type"></vscode-icon>
      <span class="step-value"></span>
      <span class="step-link"></span>
      <span class="step-swatch"></span>
    </div>
  </template>

</body>

</html>
