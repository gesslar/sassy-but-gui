<!-- sassy-webview.html: Minimal VS Code Webview UI with Custom Elements (no Shadow DOM, no framework) -->
<!-- temp document while i figure out what it's going to look like -->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sassy Webview</title>
  <style>
    :root {
      --color-bg: #1e1e1e;
      --color-fg: #d4d4d4;
      --color-accent: #3794ff;
      --color-border: #333;
      --color-status: #007acc;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      background: var(--color-bg);
      color: var(--color-fg);
      margin: 0;
      padding: 0;
      font-size: 15px;
    }

    .container {
      max-width: 600px;
      margin: 2rem auto;
      padding: 1rem;
      background: #232323;
      border-radius: 6px;
      border: 1px solid var(--color-border);
    }

    /* Collapsible Section */
    collapsible-section {
      display: block;
      margin-bottom: 1.5rem;
    }

    .collapsible {
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: #252526;
      overflow: hidden;
    }

    .collapsible-header {
      cursor: pointer;
      padding: 0.7em 1em;
      background: #232323;
      font-weight: bold;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.5em;
    }

    .collapsible-header::before {
      content: '\25B6';
      display: inline-block;
      transition: transform 0.2s;
    }

    .collapsible[open] .collapsible-header::before {
      transform: rotate(90deg);
    }

    .collapsible-content {
      padding: 0.8em 1em;
      display: none;
    }

    .collapsible[open] .collapsible-content {
      display: block;
    }

    /* Key-Value List */
    key-value-list {
      display: block;
      margin-bottom: 1.5rem;
    }

    .kv-list {
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: #232323;
      padding: 0.5em 1em;
    }

    .kv-row {
      display: flex;
      justify-content: space-between;
      padding: 0.3em 0;
      border-bottom: 1px solid #292929;
    }

    .kv-row:last-child {
      border-bottom: none;
    }

    .kv-key {
      color: var(--color-accent);
      font-weight: 500;
    }

    .kv-value {
      color: var(--color-fg);
      font-family: monospace;
    }

    /* Status Bar */
    status-bar {
      display: block;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--color-status);
      color: #fff;
      padding: 0.5em 1em;
      font-size: 0.95em;
      letter-spacing: 0.02em;
      box-shadow: 0 -2px 8px #0004;
      z-index: 10;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>VS Code Webview UI Demo</h2>
    <collapsible-section title="Section 1">
      <p>This is a collapsible section. Click the header to expand/collapse.</p>
    </collapsible-section>
    <key-value-list></key-value-list>
  </div>
  <status-bar status="Ready"></status-bar>
  <script>
    // Collapsible Section
    class CollapsibleSection extends HTMLElement {
      constructor() {
        super();
        this._open = false;
      }

      connectedCallback() {
        const title = this.getAttribute('title') || '';
        const inner = this.innerText
        this.innerText = ""

        const newDiv = document.createElement("div")

        newDiv.classList.add("collapsible")
        if (this._open)
          newDiv.classList.add("open")

        const titleDiv = document.createElement("div")
        titleDiv.classList.add("collapsible-header")
        titleDiv.innerText = title

        newDiv.appendChild(titleDiv)

        const contentDiv = document.createElement("div")
        contentDiv.classList.add("collapsible-content")
        contentDiv.innerText = inner

        newDiv.appendChild(contentDiv)

        this.appendChild(newDiv)

        this._header = this.querySelector('.collapsible-header');
        this._collapsible = this.querySelector('.collapsible');
        this._header.addEventListener('click', () => this.toggle());
      }

      toggle() {
        this._open = !this._open;
        if (this._open) {
          this._collapsible.setAttribute('open', '');
        } else {
          this._collapsible.removeAttribute('open');
        }
      }
    }
    customElements.define('collapsible-section', CollapsibleSection);

    // Key-Value List
    class KeyValueList extends HTMLElement {
      connectedCallback() {
        // Example data; replace with dynamic data as needed
        const data = [
          { key: 'Theme', value: 'Dark' },
          { key: 'Version', value: '1.0.0' },
          { key: 'Status', value: 'Active' }
        ];
        this.render(data);
      }
      render(data) {
        this.innerHTML = `
          <div class="kv-list">
            ${data.map(item => `
              <div class="kv-row">
                <span class="kv-key">${item.key}</span>
                <span class="kv-value">${item.value}</span>
              </div>
            `).join('')}
          </div>
        `;
      }
    }
    customElements.define('key-value-list', KeyValueList);

    // Status Bar
    class StatusBar extends HTMLElement {
      connectedCallback() {
        const status = this.getAttribute('status') || '';
        this.innerHTML = `<span>${status}</span>`;
      }
      set status(val) {
        this.setAttribute('status', val);
        this.innerHTML = `<span>${val}</span>`;
      }
      get status() {
        return this.getAttribute('status');
      }
    }
    customElements.define('status-bar', StatusBar);
  </script>
</body>

</html>
